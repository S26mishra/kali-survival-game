<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali's RPG Quest</title>
    <style>
        body {
            background: radial-gradient(circle, #2c1a4d 0%, #0f081d 100%);
            color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-cabinet {
            background: #1a0f2e;
            border: 4px solid #ff007f;
            border-radius: 20px;
            box-shadow: 0 0 30px #ff007f, inset 0 0 15px rgba(255, 0, 127, 0.4);
            width: 90%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .char-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        .char-card {
            flex: 1;
            background: #25163f;
            border: 2px solid #5c35a6;
            border-radius: 10px;
            padding: 10px 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .char-card:hover { border-color: #00ffff; }
        .char-card.active {
            border-color: #ff007f;
            background: #3e1b6b;
            box-shadow: 0 0 10px #ff007f;
        }
        .char-sprite-large { font-size: 30px; margin-bottom: 5px; }
        .char-name { font-size: 13px; color: #fff; text-transform: uppercase; }
        
        .hero-banner {
            background: #25163f;
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .avatar-frame {
            font-size: 50px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffcc00;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .status-text { text-align: left; }
        .hero-title { font-size: 18px; color: #ffcc00; }
        .hero-lvl { font-size: 14px; color: #aaa; }

        .stat-row {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ffcc00;
        }
        .stat-label { font-size: 14px; color: #aaaaaa; text-transform: uppercase; }
        .stat-value { font-size: 20px; color: #ffffff; text-shadow: 0 0 5px #fff; }
        .gold-value { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
        .bag-box {
            background: #0d071a;
            border: 2px dashed #ff007f;
            border-radius: 8px;
            padding: 12px;
            min-height: 35px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #00ffcc;
        }
        .action-pad {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .game-btn {
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 0 #000;
            transition: all 0.1s ease;
        }
        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000;
        }
        .btn-quest { background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%); }
        .btn-battle { background: linear-gradient(180deg, #ff1744 0%, #b71c1c 100%); }
        .battle-log {
            background-color: #000000;
            border: 2px solid #333;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            font-size: 12px;
            min-height: 35px;
            box-shadow: inset 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

<div class="game-cabinet">
    <h1>Kali's World</h1>

    <!-- Character Selection Buttons -->
    <div class="char-selector">
        <div class="char-card active" onclick="selectHero('Kali', '🧑‍🎤')">
            <div class="char-sprite-large">🧑‍🎤</div>
            <div class="char-name">Kali</div>
        </div>
        <div class="char-card" onclick="selectHero('Susi', '👩‍🚀')">
            <div class="char-sprite-large">👩‍🚀</div>
            <div class="char-name">Susi</div>
        </div>
        <div class="char-card" onclick="selectHero('Cat', '🐱')">
            <div class="char-sprite-large">🐱</div>
            <div class="char-name">Cat</div>
        </div>
    </div>

    <!-- Active Selected Character View Profile -->
    <div class="hero-banner">
        <div id="hero-avatar" class="avatar-frame">🧑‍🎤</div>
        <div class="status-text">
            <div id="hero-display-name" class="hero-title">Kali</div>
            <div class="hero-lvl">🛡️ LEVEL: <span id="level">1</span></div>
        </div>
    </div>

    <div class="stat-row" style="border-left-color: #00ffff;">
        <span class="stat-label">⚔️ Power Rating</span>
        <span id="power" class="stat-value">10</span>
    </div>

    <div class="stat-row" style="border-left-color: #ffcc00;">
        <span class="stat-label">💰 Gold Coins</span>
        <span id="gold" class="stat-value gold-value">0g</span>
    </div>

    <div class="stat-label" style="margin-bottom: 5px; text-align: left;">🎒 Loot Inventory Bag:</div>
    <div id="equipment" class="bag-box">Empty Backpack</div>

    <div class="action-pad">
        <button class="game-btn btn-quest" onclick="triggerAction('complete')">🏃 Go Quest</button>
        <button class="game-btn btn-battle" onclick="triggerAction('battle')">⚔️ Fight</button>
    </div>

    <div id="log" class="battle-log">Choose a hero to begin your survival story...</div>
</div>

<script>
    const API_URL = 'http://192.168.1.12:3000/api/game';
    let currentHeroName = "Kali";

    function selectHero(name, sprite) {
        currentHeroName = name;
        
        // Remove active highlights from all cards
        document.querySelectorAll('.char-card').forEach(card => card.classList.remove('active'));
        
        // Find clicked card and highlight it
        event.currentTarget.classList.add('active');
        
        // Swap visual dashboard frame contents
        document.getElementById('hero-avatar').innerText = sprite;
        document.getElementById('hero-display-name').innerText = name;
        document.getElementById('log').innerText = `${name} has stepped into the game loop arena!`;
    }

    async function fetchGameState() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            updateUI(data);
        } catch (err) {
            document.getElementById('log').innerHTML = "<span style='color: #ff1744;'>SYSTEM ERROR: Connection offline.</span>";
        }
    }

    async function triggerAction(actionType) {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: actionType, hero: currentHeroName })
            });
            const data = await res.json();
            updateUI(data);
            
            // Format log to use character name dynamically
            let msg = data.logMessage.replace("Hero", currentHeroName).replace("hero", currentHeroName);
            document.getElementById('log').innerText = msg;
        } catch (err) {
            document.getElementById('log').innerHTML = "<span style='color: #ff1744;'>COMBAT ERROR: Server drop.</span>";
        }
    }

    function updateUI(data) {
        document.getElementById('level').innerText = data.level;
        document.getElementById('power').innerText = data.combatPower;
        document.getElementById('gold').innerText = data.gold + 'g';
        document.getElementById('equipment').innerText = data.equipment.length > 0 ? data.equipment.join(', ') : 'Empty Backpack';
    }

    fetchGameState();
</script>
</body>
</html>
