<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kali's Legend: Journey with Susi</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-wrapper {
            position: relative; 
            width: 800px; 
            height: 450px;
        }
        #game-container canvas {
            border: 4px solid #33ff33;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
        }
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 15, 0, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #33ff33; border: 2px solid #33ff33; border-radius: 4px;
        }
        .menu-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px #33ff33; text-align: center; }
        .btn-action {
            background: #004400; border: 2px solid #33ff33; padding: 12px 35px; font-size: 16px; color: #33ff33;
            cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px;
        }
        .btn-action:hover { background: #33ff33; color: #000; }
        .mobile-controls {
            position: absolute; bottom: 12px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 5; pointer-events: none;
        }
        .dir-pad, .action-pad { display: flex; gap: 15px; pointer-events: auto; }
        .ctrl-btn {
            width: 52px; height: 52px; background: #002200; border: 2px solid #33ff33; border-radius: 50%;
            color: #33ff33; font-size: 22px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; user-select: none;
        }
        .ctrl-btn:active { background: #33ff33; color: #000; }
        .btn-power { background: #440000; border-color: #ff3333; color: #ff3333; font-size: 12px; font-weight: bold; border-radius: 8px; width: 65px; }
        .btn-power:active { background: #ff3333; color: #000; }
        .hud-overlay {
            position: absolute; top: 15px; left: 15px; pointer-events: none; color: #33ff33;
            z-index: 4; display: flex; flex-direction: column; gap: 4px;
        }
        #hud-lvl { font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; }
        #hud-log { font-size: 12px; background: rgba(0,0,0,0.85); padding: 5px 10px; border: 1px solid #33ff33; border-radius: 4px; max-width: 500px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud-overlay">
        <div id="hud-lvl">Stage 1 - Level 1 | Age: 5 | Shield: 100%</div>
        <div id="hud-log">System Initialized. Clear the virus hazards and advance!</div>
    </div>

    <!-- UI Terminal Overlay Menu -->
    <div id="start-menu" class="overlay-screen">
        <div class="menu-title" id="menu-header">🟩 MATRIX GRID ONLINE 🟩</div>
        <p id="menu-desc" style="text-align:center; max-width:500px; font-size:14px; line-height:1.5;">Kali and Susi Combat Link Activated. Secure the core matrix fields across all 150 Stages.</p>
        <button id="main-menu-btn" class="btn-action" onclick="initRuntimeLevel()">INITIALIZE LEVEL</button>
    </div>

    <div id="game-container"></div>
    
    <div class="mobile-controls">
        <div class="dir-pad">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="action-pad">
            <div class="ctrl-btn" id="btn-jump">▲</div>
            <div class="ctrl-btn btn-power" id="btn-fire">FIRE</div>
        </div>
    </div>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1100 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, partnerSusi, targetKitty, mapPlatforms, cursors, enemiesGroup, kaliLasers, susiLasers;
    let moveLeft = false, moveRight = false, doJump = false;
    let facingDirection = 'right';
    let lastDroneFireTime = 0;

    let sysProgress = {
        stage: 1,
        level: 1,
        age: 5,
        shield: 100,
        runtimeActive: false
    };

    function preload() {
        let generateVectorGraphic = (key, w, h, drawCallback) => {
            let canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            let ctx = canvas.getContext('2d');
            drawCallback(ctx);
            game.textures.addCanvas(key, canvas);
        };

        // Exact Onion-headed Avatar (Kali) from image_725a26.jpg
        generateVectorGraphic('kali_avatar', 32, 44, (ctx) => {
            // Purple Onion Mask Head
            ctx.fillStyle = '#b366cc';
            ctx.beginPath();
            ctx.arc(16, 20, 11, 0, Math.PI * 2);
            ctx.fill();
            // Pointy Top Spire Tip
            ctx.beginPath();
            ctx.moveTo(16, 2);
            ctx.lineTo(9, 12);
            ctx.lineTo(23, 12);
            ctx.fill();
            // Large Yellow Eye/Goggle Visor Rings
            ctx.fillStyle = '#ffea00';
            ctx.beginPath();
            ctx.arc(16, 20, 7, 0, Math.PI * 2);
            ctx.fill();
            // Inner Core Focus Eyes
            ctx.fillStyle = '#ff3300';
            ctx.fillRect(13, 19, 6, 3);
            // Orange Base Body Support Stalk
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(12, 31, 8, 13);
        });

        // Target Kitty Block Node
        generateVectorGraphic('kitty_node', 32, 32, (ctx) => {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 2; ctx.strokeRect(2, 2, 28, 28);
            ctx.fillStyle = '#33ff33'; ctx.fillRect(10, 10, 12, 12);
        });

        // Susi Combat Support Drone Fighter
        generateVectorGraphic('susi_drone', 24, 24, (ctx) => {
            ctx.fillStyle = '#00ffff';
            ctx.beginPath(); ctx.arc(12, 12, 8, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.strokeRect(2, 2, 20, 20);
        });

        // Solid Matrix Green Floor Block
        generateVectorGraphic('matrix_floor', 32, 32, (ctx) => {
            ctx.fillStyle = '#0c2c0c'; ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 1; ctx.strokeRect(0, 0, 32, 32);
        });

        // Virus Hazard Code-Blocks (Enemies)
        generateVectorGraphic('virus_hazard', 32, 32, (ctx) => {
            ctx.fillStyle = '#ff2222'; ctx.fillRect(4, 4, 24, 24);
            ctx.strokeStyle = '#ffffff'; ctx.strokeRect(1, 1, 30, 30);
        });

        // Projectile Entities
        generateVectorGraphic('laser_green', 14, 6, (ctx) => { ctx.fillStyle = '#33ff33'; ctx.fillRect(0, 0, 14, 6); });
        generateVectorGraphic('laser_purple', 10, 10, (ctx) => { ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(5,5,5,0,Math.PI*2); ctx.fill(); });
    }

    function create() {
        // Build Exact Vector Array Grid Background
        let grid = this.add.graphics();
        grid.lineStyle(1, 0x115511, 0.8);
        for (let x = 0; x <= 4000; x += 30) { grid.lineBetween(x, 0, x, 450); }
        for (let y = 0; y <= 450; y += 30) { grid.lineBetween(0, y, 4000, y); }
        
        grid.lineStyle(0.5, 0x072207, 0.5);
        for (let x = 0; x < 4000; x += 30) {
            for (let y = 0; y < 450; y += 30) { grid.lineBetween(x, y, x + 30, y + 30); }
        }

        this.physics.world.setBounds(0, 0, 4000, 450);
        mapPlatforms = this.physics.add.staticGroup();
        enemiesGroup = this.physics.add.group();
        kaliLasers = this.physics.add.group();
        susiLasers = this.physics.add.group();

        // Build Level Base Floor
        for (let x = 0; x < 4000; x += 32) {
            mapPlatforms.create(x, 434, 'matrix_floor').setOrigin(0, 0).refreshBody();
        }

        player = this.physics.add.sprite(100, 300, 'kali_avatar').setCollideWorldBounds(true);
        partnerSusi = this.physics.add.sprite(70, 260, 'susi_drone').setCollideWorldBounds(true);
        partnerSusi.body.allowGravity = false;

        targetKitty = this.physics.add.sprite(3800, 350, 'kitty_node').setCollideWorldBounds(true);

        this.physics.add.collider(player, mapPlatforms);
        this.physics.add.collider(targetKitty, mapPlatforms);
        this.physics.add.collider(enemiesGroup, mapPlatforms);

        this.cameras.main.setBounds(0, 0, 4000, 450);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);

        cursors = this.input.keyboard.createCursorKeys();

        // Overlap Clear Verification
        this.physics.add.overlap(player, targetKitty, () => {
            if (sysProgress.runtimeActive) advanceNextMatrixSegment();
        }, null, this);

        // Weapon Systems Collision
        this.physics.add.overlap([kaliLasers, susiLasers], enemiesGroup, (projectile, enemy) => {
            projectile.destroy();
            enemy.destroy();
        });

        this.physics.add.collider(player, enemiesGroup, (pl, enemy) => {
            enemy.destroy();
            sysProgress.shield -= 25;
            refreshTerminalHUD();
            if (sysProgress.shield <= 0) {
                sysProgress.shield = 100;
                initRuntimeLevel();
            }
        });

        // Map Control Inputs
        const bindInput = (id, prop) => {
            let btn = document.getElementById(id);
            btn.addEventListener('mousedown', () => window[prop] = true);
            btn.addEventListener('mouseup', () => window[prop] = false);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); window[prop] = true; });
            btn.addEventListener('touchend', () => window[prop] = false);
        };
        bindInput('btn-left', 'moveLeft');
        bindInput('btn-right', 'moveRight');
        bindInput('btn-jump', 'doJump');

        document.getElementById('btn-fire').addEventListener('click', triggerKaliLaser);
        this.input.keyboard.on('keydown-SPACE', triggerKaliLaser);

        document.getElementById('start-menu').style.display = 'flex';
        this.physics.pause();
    }

    function triggerKaliLaser() {
        if (!sysProgress.runtimeActive) return;
        let offset = facingDirection === 'right' ? 20 : -20;
        let shot = kaliLasers.create(player.x + offset, player.y - 4, 'laser_green');
        shot.body.allowGravity = false;
        shot.setVelocityX(facingDirection === 'right' ? 650 : -650);
    }

    function initRuntimeLevel() {
        document.getElementById('start-menu').style.display = 'none';
        game.scene.scenes[0].physics.resume();
        sysProgress.runtimeActive = true;

        // Reset positions
        player.x = 100; player.y = 350;
        targetKitty.x = 800 + (sysProgress.level * 600); // Level maps expand outwards lineally
        if (targetKitty.x > 3900) targetKitty.x = 3900;
        targetKitty.body.updateFromObj();

        // Wipe out old active threat blocks
        enemiesGroup.clear(true, true);

        // Generate Procedural Platform Ledges & Dynamic Threat Vectors
        let platformCount = 3 + sysProgress.level;
        for (let i = 0; i < platformCount; i++) {
            let platX = 350 + (i * 450) + Phaser.Math.Between(-50, 50);
            let platY = Phaser.Math.Between(220, 310);
            
            for (let block = 0; block < 4; block++) {
                mapPlatforms.create(platX + (block * 32), platY, 'matrix_floor').setOrigin(0,0).refreshBody();
            }

            // Spawn dynamic hazard units based on Stage Difficulty modifiers
            if (i > 0) {
                let hazard = enemiesGroup.create(platX + 48, platY - 40, 'virus_hazard');
                hazard.setVelocityX(Phaser.Math.Between(-50, -150) - (sysProgress.stage * 3));
                hazard.setBounce(1, 0).setCollideWorldBounds(true);
            }
        }

        refreshTerminalHUD();
        document.getElementById('hud-log').innerText = `Stage ${sysProgress.stage} - Objective: Guard your position and reach the Matrix block terminal at X=${Math.round(targetKitty.x)}!`;
    }

    function update(time) {
        if (!sysProgress.runtimeActive) return;

        // Smooth Drone Lag Follow Mechanic for Partner Susi
        partnerSusi.x = Phaser.Math.Linear(partnerSusi.x, player.x - (facingDirection === 'right' ? 35 : -35), 0.1);
        partnerSusi.y = Phaser.Math.Linear(partnerSusi.y, player.y - 30, 0.1);

        // Core Movement Vector Input Loops
        if (cursors.left.isDown || window.moveLeft) {
            player.setVelocityX(-240); facingDirection = 'left';
        } else if (cursors.right.isDown || window.moveRight) {
            player.setVelocityX(240); facingDirection = 'right';
        } else {
            player.setVelocityX(0);
        }

        if ((cursors.up.isDown || window.doJump) && player.body.touching.down) {
            player.setVelocityY(-480);
        }

        // Automatic Combat AI Routines for Partner Susi
        if (time > lastDroneFireTime + 1200) {
            let nearestEnemy = enemiesGroup.getFirstAlive();
            if (nearestEnemy && Phaser.Math.Distance.Between(partnerSusi.x, partnerSusi.y, nearestEnemy.x, nearestEnemy.y) < 380) {
                lastDroneFireTime = time;
                let plasma = susiLasers.create(partnerSusi.x, partnerSusi.y, 'laser_purple');
                plasma.body.allowGravity = false;
                this.physics.moveToObject(plasma, nearestEnemy, 400);
            }
        }
    }

    function advanceNextMatrixSegment() {
        sysProgress.runtimeActive = false;
        game.scene.scenes[0].physics.pause();

        sysProgress.level++;
        if (sysProgress.level > 4) { // 4 Sublevels per main global stage structure
            sysProgress.level = 1;
            sysProgress.stage++;
            sysProgress.age += 2; // Incremental Age maturation mechanics
        }

        if (sysProgress.stage > 150) {
            document.getElementById('menu-header').innerText = "⚡ THE OMEGA TERMINAL CLEARED ⚡";
            document.getElementById('menu-desc').innerText = "Incredible! You have completely solved all 150 stages of the Matrix Grid framework with Kali and Susi!";
            document.getElementById('main-menu-btn').style.display = 'none';
            document.getElementById('start-menu').style.display = 'flex';
            return;
        }

        document.getElementById('menu-header').innerText = `🟩 STAGE MODULATION COMPLETE 🟩`;
        document.getElementById('menu-desc').innerText = `Successfully verified code segment. Prepare to sync data pipelines for Stage ${sysProgress.stage} - Level ${sysProgress.level}.`;
        document.getElementById('main-menu-btn').innerText = `SYNC NEXT SECTOR`;
        
        document.getElementById('main-menu-btn').onclick = initRuntimeLevel;
        document.getElementById('start-menu').style.display = 'flex';
    }

    function refreshTerminalHUD() {
        document.getElementById('hud-lvl').innerText = `Stage ${sysProgress.stage} - Level ${sysProgress.level} | Age: ${sysProgress.age} | Shield: ${sysProgress.shield}%`;
    }
</script>
</body>
</html>
