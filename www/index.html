<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kali's Legend: Locked Combat Framework</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-wrapper {
            position: relative; 
            width: 800px; 
            height: 450px;
        }
        #game-container canvas {
            border: 4px solid #33ff33;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
        }
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #33ff33; border: 2px solid #33ff33; border-radius: 4px;
        }
        .menu-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px #33ff33; text-align: center; }
        .btn-action {
            background: #004400; border: 2px solid #33ff33; padding: 12px 35px; font-size: 16px; color: #33ff33;
            cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px;
        }
        .btn-action:hover { background: #33ff33; color: #000; }
        .mobile-controls {
            position: absolute; bottom: 12px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 5; pointer-events: none;
        }
        .dir-pad, .action-pad { display: flex; gap: 15px; pointer-events: auto; }
        .ctrl-btn {
            width: 52px; height: 52px; background: #002200; border: 2px solid #33ff33; border-radius: 50%;
            color: #33ff33; font-size: 22px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; user-select: none;
        }
        .ctrl-btn:active { background: #33ff33; color: #000; }
        .btn-power { background: #440000; border-color: #ff3333; color: #ff3333; font-size: 12px; font-weight: bold; border-radius: 8px; width: 65px; }
        .btn-power:active { background: #ff3333; color: #000; }
        .hud-overlay {
            position: absolute; top: 15px; left: 15px; pointer-events: none; color: #33ff33;
            z-index: 4; display: flex; flex-direction: column; gap: 4px;
        }
        #hud-lvl { font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; }
        #hud-log { font-size: 12px; background: rgba(0,0,0,0.85); padding: 5px 10px; border: 1px solid #33ff33; border-radius: 4px; max-width: 500px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud-overlay">
        <div id="hud-lvl">Level: 1 / 350 | Age: 5 | Shield: 100%</div>
        <div id="hud-log">Tutorial Sync Active. Step right to clear Level 1 instantly!</div>
    </div>

    <!-- UI Terminal Overlay Menu -->
    <div id="start-menu" class="overlay-screen">
        <div class="menu-title" id="menu-header">🟩 HUMAN RESISTANCE LOCK 🟩</div>
        <p id="menu-desc" style="text-align:center; max-width:500px; font-size:14px; line-height:1.5;">Humanoid sprite configured. Warning: From Level 2 onward, threats will engage from all coordinates (Left, Right, Above, Below).</p>
        <button id="main-menu-btn" class="btn-action" onclick="initRuntimeLevel()">START INTERFACE</button>
    </div>

    <div id="game-container"></div>
    
    <div class="mobile-controls">
        <div class="dir-pad">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="action-pad">
            <div class="ctrl-btn" id="btn-jump">▲</div>
            <div class="ctrl-btn btn-power" id="btn-fire">FIRE</div>
        </div>
    </div>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1100 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, partnerSusi, targetKitty, mapPlatforms, cursors, enemiesGroup, kaliLasers, susiLasers;
    let moveLeft = false, moveRight = false, doJump = false;
    let facingDirection = 'right';
    let lastDroneFireTime = 0;
    let globalAmbushTimer = null;

    let sysProgress = {
        stage: 1,
        level: 1,
        maxLevels: 350,
        age: 5,
        shield: 100,
        runtimeActive: false
    };

    function preload() {
        let generateVectorGraphic = (key, w, h, drawCallback) => {
            let canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            let ctx = canvas.getContext('2d');
            drawCallback(ctx);
            game.textures.addCanvas(key, canvas);
        };

        // Preserved Humanoid Character Model
        generateVectorGraphic('kali_humanoid', 32, 48, (ctx) => {
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(16, 8, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#00ffff'; ctx.fillRect(13, 6, 7, 2);
            ctx.fillStyle = '#3366cc'; ctx.fillRect(10, 14, 12, 16);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(6, 15, 4, 12); ctx.fillRect(22, 15, 4, 12);
            ctx.fillStyle = '#222222'; ctx.fillRect(10, 30, 5, 14); ctx.fillRect(17, 30, 5, 14);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(9, 44, 6, 4); ctx.fillRect(17, 44, 6, 4);
        });

        generateVectorGraphic('kitty_node', 32, 32, (ctx) => {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 2; ctx.strokeRect(2, 2, 28, 28);
            ctx.fillStyle = '#33ff33'; ctx.fillRect(10, 10, 12, 12);
        });

        generateVectorGraphic('susi_drone', 24, 24, (ctx) => {
            ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(12, 12, 7, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.strokeRect(2, 2, 20, 20);
        });

        generateVectorGraphic('matrix_floor', 32, 32, (ctx) => {
            ctx.fillStyle = '#0d260d'; ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 1; ctx.strokeRect(0, 0, 32, 32);
        });

        generateVectorGraphic('virus_hazard', 32, 32, (ctx) => {
            ctx.fillStyle = '#ee2222'; ctx.fillRect(4, 4, 24, 24);
            ctx.strokeStyle = '#ffffff'; ctx.strokeRect(1, 1, 30, 30);
        });

        generateVectorGraphic('laser_green', 14, 6, (ctx) => { ctx.fillStyle = '#33ff33'; ctx.fillRect(0, 0, 14, 6); });
        generateVectorGraphic('laser_purple', 10, 10, (ctx) => { ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(5,5,5,0,Math.PI*2); ctx.fill(); });
    }

    function create() {
        let grid = this.add.graphics();
        grid.lineStyle(1, 0x114411, 0.7);
        for (let x = 0; x <= 4000; x += 30) { grid.lineBetween(x, 0, x, 450); }
        for (let y = 0; y <= 450; y += 30) { grid.lineBetween(0, y, 4000, y); }

        this.physics.world.setBounds(0, 0, 4000, 450);
        mapPlatforms = this.physics.add.staticGroup();
        enemiesGroup = this.physics.add.group();
        kaliLasers = this.physics.add.group();
        susiLasers = this.physics.add.group();

        for (let x = 0; x < 4000; x += 32) {
            mapPlatforms.create(x, 434, 'matrix_floor').setOrigin(0, 0).refreshBody();
        }

        player = this.physics.add.sprite(100, 300, 'kali_humanoid').setCollideWorldBounds(true);
        partnerSusi = this.physics.add.sprite(70, 260, 'susi_drone').setCollideWorldBounds(true);
        partnerSusi.body.allowGravity = false;

        targetKitty = this.physics.add.sprite(300, 350, 'kitty_node').setCollideWorldBounds(true);

        this.physics.add.collider(player, mapPlatforms);
        this.physics.add.collider(targetKitty, mapPlatforms);
        this.physics.add.collider(enemiesGroup, mapPlatforms);

        this.cameras.main.setBounds(0, 0, 4000, 450);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);

        cursors = this.input.keyboard.createCursorKeys();

        this.physics.add.overlap(player, targetKitty, () => {
            if (sysProgress.runtimeActive) advanceNextMatrixSegment();
        }, null, this);

        this.physics.add.overlap([kaliLasers, susiLasers], enemiesGroup, (projectile, enemy) => {
            projectile.destroy();
            enemy.destroy();
        });

        this.physics.add.collider(player, enemiesGroup, (pl, enemy) => {
            enemy.destroy();
            sysProgress.shield -= 20;
            refreshTerminalHUD();
            if (sysProgress.shield <= 0) {
                sysProgress.shield = 100;
                initRuntimeLevel();
            }
        });

        const bindInput = (id, prop) => {
            let btn = document.getElementById(id);
            btn.addEventListener('mousedown', () => window[prop] = true);
            btn.addEventListener('mouseup', () => window[prop] = false);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); window[prop] = true; });
            btn.addEventListener('touchend', () => window[prop] = false);
        };
        bindInput('btn-left', 'moveLeft');
        bindInput('btn-right', 'moveRight');
        bindInput('btn-jump', 'doJump');

        document.getElementById('btn-fire').addEventListener('click', triggerKaliLaser);
        this.input.keyboard.on('keydown-SPACE', triggerKaliLaser);

        document.getElementById('start-menu').style.display = 'flex';
        this.physics.pause();
    }

    function triggerKaliLaser() {
        if (!sysProgress.runtimeActive) return;
        let offset = facingDirection === 'right' ? 20 : -20;
        let shot = kaliLasers.create(player.x + offset, player.y - 8, 'laser_green');
        shot.body.allowGravity = false;
        shot.setVelocityX(facingDirection === 'right' ? 700 : -700);
    }

    function initRuntimeLevel() {
        document.getElementById('start-menu').style.display = 'none';
        game.scene.scenes[0].physics.resume();
        sysProgress.runtimeActive = true;

        if (globalAmbushTimer) { globalAmbushTimer.destroy(); globalAmbushTimer = null; }

        player.x = 100; player.y = 350;
        let currentTotalLevel = ((sysProgress.stage - 1) * 4) + sysProgress.level;

        // Level 1 Shortening Logic
        if (currentTotalLevel === 1) {
            targetKitty.x = 450; // Super close target
            enemiesGroup.clear(true, true);
            document.getElementById('hud-log').innerText = "Level 1: Safe Zone. Run right to start the actual war!";
        } else {
            // Standard progressive distance maps
            targetKitty.x = 1000 + (sysProgress.level * 600);
            if (targetKitty.x > 3900) targetKitty.x = 3900;
            
            enemiesGroup.clear(true, true);

            // Base platform procedural geometry structures
            let platformCount = 4 + sysProgress.level;
            for (let i = 0; i < platformCount; i++) {
                let platX = 400 + (i * 400) + Phaser.Math.Between(-30, 30);
                let platY = Phaser.Math.Between(220, 320);
                for (let block = 0; block < 4; block++) {
                    mapPlatforms.create(platX + (block * 32), platY, 'matrix_floor').setOrigin(0,0).refreshBody();
                }
            }

            // LEVEL 2+ SPATIAL 4-WAY AMBUSH ENGINE ENGINE
            globalAmbushTimer = game.scene.scenes[0].time.addEvent({
                delay: Math.max(1200 - (currentTotalLevel * 5), 500), 
                loop: true,
                callback: spawnOmniDirectionalThreat
            });

            document.getElementById('hud-log').innerText = `COMBAT SYSTEM ACTIVE! Watch all 4 directions!`;
        }
        
        targetKitty.body.updateFromObj();
        refreshTerminalHUD();
    }

    function spawnOmniDirectionalThreat() {
        if (!sysProgress.runtimeActive) return;

        let spawnDir = Phaser.Math.Between(0, 3); // 0=Top, 1=Bottom, 2=Left, 3=Right
        let spawnX, spawnY, velX = 0, velY = 0;
        let speed = 150 + (sysProgress.stage * 4);

        switch(spawnDir) {
            case 0: // From Above
                spawnX = Phaser.Math.Between(player.x - 300, player.x + 300);
                spawnY = player.y - 250;
                velY = speed;
                break;
            case 1: // From Below
                spawnX = Phaser.Math.Between(player.x - 200, player.x + 200);
                spawnY = 410;
                velY = -speed;
                break;
            case 2: // From the Left Side
                spawnX = player.x - 400;
                spawnY = Phaser.Math.Between(150, 380);
                velX = speed;
                break;
            case 3: // From the Right Side
                spawnX = player.x + 400;
                spawnY = Phaser.Math.Between(150, 380);
                velX = -speed;
                break;
        }

        // Restrict bounds checking
        if (spawnX < 0) spawnX = 10;
        if (spawnX > 4000) spawnX = 3900;

        let hazard = enemiesGroup.create(spawnX, spawnY, 'virus_hazard');
        hazard.body.allowGravity = false; // Allows accurate up/down floating tracking
        hazard.setVelocity(velX, velY);
    }

    function update(time) {
        if (!sysProgress.runtimeActive) return;

        partnerSusi.x = Phaser.Math.Linear(partnerSusi.x, player.x - (facingDirection === 'right' ? 35 : -35), 0.1);
        partnerSusi.y = Phaser.Math.Linear(partnerSusi.y, player.y - 25, 0.1);

        if (cursors.left.isDown || window.moveLeft) {
            player.setVelocityX(-240); facingDirection = 'left';
        } else if (cursors.right.isDown || window.moveRight) {
            player.setVelocityX(240); facingDirection = 'right';
        } else {
            player.setVelocityX(0);
        }

        if ((cursors.up.isDown || window.doJump) && player.body.touching.down) {
            player.setVelocityY(-480);
        }

        // Auto Susi target engagement systems logic
        if (time > lastDroneFireTime + 800) { // Susi speed buffed to support your fights!
            let nearestEnemy = enemiesGroup.getFirstAlive();
            if (nearestEnemy && Phaser.Math.Distance.Between(partnerSusi.x, partnerSusi.y, nearestEnemy.x, nearestEnemy.y) < 400) {
                lastDroneFireTime = time;
                let plasma = susiLasers.create(partnerSusi.x, partnerSusi.y, 'laser_purple');
                plasma.body.allowGravity = false;
                this.physics.moveToObject(plasma, nearestEnemy, 450);
            }
        }
    }

    function advanceNextMatrixSegment() {
        sysProgress.runtimeActive = false;
        game.scene.scenes[0].physics.pause();
        if (globalAmbushTimer) { globalAmbushTimer.destroy(); globalAmbushTimer = null; }

        let currentTotalLevel = ((sysProgress.stage - 1) * 4) + sysProgress.level;

        if (currentTotalLevel >= sysProgress.maxLevels) {
            document.getElementById('menu-header').innerText = "⚡ ABSOLUTE MASTER ⚡";
            document.getElementById('menu-desc').innerText = "350 Levels Cleared! You survived the complete omni-directional combat array!";
            document.getElementById('main-menu-btn').style.display = 'none';
            document.getElementById('start-menu').style.display = 'flex';
            return;
        }

        sysProgress.level++;
        if (sysProgress.level > 4) { 
            sysProgress.level = 1;
            sysProgress.stage++;
            sysProgress.age += 1; 
        }

        let nextTotalLevel = ((sysProgress.stage - 1) * 4) + sysProgress.level;

        document.getElementById('menu-header').innerText = `🟩 STAGE UNLOCKED 🟩`;
        document.getElementById('menu-desc').innerText = `Level ${currentTotalLevel} Defeated. Syncing grid data configurations for Level ${nextTotalLevel} / 350...`;
        document.getElementById('main-menu-btn').innerText = `ENGAGE ZONE`;
        
        document.getElementById('main-menu-btn').onclick = initRuntimeLevel;
        document.getElementById('start-menu').style.display = 'flex';
    }

    function refreshTerminalHUD() {
        let currentTotalLevel = ((sysProgress.stage - 1) * 4) + sysProgress.level;
        document.getElementById('hud-lvl').innerText = `Level: ${currentTotalLevel} / 350 | Age: ${sysProgress.age} | Shield: ${sysProgress.shield}%`;
    }
</script>
</body>
</html>
