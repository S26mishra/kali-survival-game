<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Kali's Legend: Journey with Susi</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #030107;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }
        #game-wrapper {
            position: relative; 
            width: 800px; 
            height: 450px;
            box-sizing: border-box;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        #game-container canvas {
            border: 3px solid #ff007f;
            border-radius: 8px;
            box-shadow: 0 0 20px #00ffff;
        }
        
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 27, 11, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; box-sizing: border-box; padding: 15px; color: #33ff33;
            border-radius: 8px;
            border: 2px solid #33ff33;
        }
        .menu-title { color: #33ff33; font-size: 22px; text-shadow: 0 0 10px #33ff33; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        
        .btn-action {
            background: linear-gradient(180deg, #118811 0%, #004400 100%);
            border: 2px solid #33ff33; padding: 12px 30px; font-size: 16px; color: #33ff33;
            border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 255, 0, 0.3); margin: 10px; transition: 0.2s;
        }
        .btn-action:hover { transform: scale(1.05); background: #33ff33; color: #000; }

        .mobile-controls {
            position: absolute; bottom: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 5; pointer-events: none;
        }
        .dir-pad, .action-pad { display: flex; gap: 15px; pointer-events: auto; }
        .ctrl-btn {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, #1a3a1a 0%, #051405 100%);
            border: 2px solid #33ff33; border-radius: 50%;
            color: #33ff33; font-size: 20px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 0 #000; user-select: none;
        }
        .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #33ff33; color: #000; }
        .btn-power { background: linear-gradient(180deg, #ff5722 0%, #bf360c 100%); border-color: #ffcc00; color: white; width: 70px; font-size: 13px; border-radius: 12px; }
        
        .hud-overlay {
            position: absolute; top: 15px; left: 15px; pointer-events: none; color: #33ff33; font-family: Arial, sans-serif;
            z-index: 4; display: flex; flex-direction: column; gap: 5px;
        }
        #hud-lvl { color: #33ff33; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        #hud-log { color: #ffffff; font-size: 12px; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; border: 1px solid #116611; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud-overlay">
        <div id="hud-lvl">Age: 5 | Shield: 100%</div>
        <div id="hud-log">Loading matrix grid system... Click START below.</div>
    </div>

    <div id="start-menu" class="overlay-screen">
        <div class="menu-title" id="menu-header">⚔️ Kali's Legend: Retro Journey ⚔️</div>
        <p id="menu-desc" style="text-align:center; max-width:440px; font-size:14px; line-height:1.4;">Navigate the green grid vector space, rescue your companion, and bypass obstacles!</p>
        <button id="main-menu-btn" class="btn-action" onclick="startCurrentStage()">START MATRIX</button>
    </div>

    <div id="game-container"></div>
    
    <div class="mobile-controls">
        <div class="dir-pad">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="action-pad">
            <div class="ctrl-btn" id="btn-jump">▲</div>
            <div class="ctrl-btn btn-power" id="btn-fire">FIRE</div>
        </div>
    </div>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1000 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, partnerSusi, kittyCat, mapPlatforms, cursors, enemiesGroup, projectilesGroup;
    let moveLeft = false, moveRight = false, doJump = false;
    let facingDirection = 'right';
    let lastSpawnX = 0;
    
    let gameState = { 
        levelIndex: 1, age: 5, currentJumpVelocity: -450, isKittySaved: false,
        kaliShield: 100, isChangingStage: false
    };

    function preload() {
        let createTexture = (key, width, height, drawFn) => {
            let canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            let ctx = canvas.getContext('2d');
            drawFn(ctx);
            game.textures.addCanvas(key, canvas);
        };

        // Standardized Platform Brick Tile
        createTexture('platform_tile', 32, 32, (ctx) => {
            ctx.fillStyle = '#143314';
            ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(1, 1, 30, 30);
        });

        // Onion Character
        createTexture('hero_sprite', 32, 48, (ctx) => {
            // Purple Onion Head
            ctx.fillStyle = '#a164a9';
            ctx.beginPath();
            ctx.arc(16, 18, 12, 0, Math.PI * 2);
            ctx.fill();
            
            // Pointy Onion top tip
            ctx.fillStyle = '#a164a9';
            ctx.beginPath();
            ctx.moveTo(16, 2);
            ctx.lineTo(10, 10);
            ctx.lineTo(22, 10);
            ctx.fill();

            // Large yellow outer eye ring
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(16, 18, 6, 0, Math.PI * 2);
            ctx.fill();

            // Center pupil eye slit
            ctx.fillStyle = '#ff3300';
            ctx.fillRect(14, 17, 4, 3);

            // Little brown body stalk/feet support
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(12, 30, 8, 14);
        });

        // Companion Target item
        createTexture('cat_sprite', 32, 32, (ctx) => {
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(4, 8, 24, 24);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(4, 8, 24, 24);
        });

        // Secondary Susi Vector Entity
        createTexture('susi_sprite', 32, 44, (ctx) => {
            ctx.fillStyle = '#00aa00';
            ctx.fillRect(6, 14, 20, 30);
            ctx.fillStyle = '#33ff33';
            ctx.fillRect(12, 4, 8, 8);
        });

        // Danger block obstacle
        createTexture('enemy_sprite', 32, 32, (ctx) => {
            ctx.fillStyle = '#ff2222';
            ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#ffffff';
            ctx.strokeRect(2, 2, 28, 28);
        });

        // Projectile Laser
        createTexture('laser_sprite', 16, 16, (ctx) => {
            ctx.fillStyle = '#33ff33';
            ctx.beginPath(); ctx.arc(8, 8, 5, 0, Math.PI * 2); ctx.fill();
        });
    }

    function create() {
        // Build the precise green retro vector grid framework
        let gridGraphic = this.add.graphics();
        gridGraphic.lineStyle(1, 0x116611, 1);

        const worldWidth = 12000;
        const worldHeight = 450;
        const cellSize = 30;

        // Draw vertical system lines
        for (let x = 0; x <= worldWidth; x += cellSize) {
            gridGraphic.lineBetween(x, 0, x, worldHeight);
        }
        // Draw horizontal system lines
        for (let y = 0; y <= worldHeight; y += cellSize) {
            gridGraphic.lineBetween(0, y, worldWidth, y);
        }
        
        // Draw the diagnostic cross diagonal lines inside every cell grid block
        gridGraphic.lineStyle(0.5, 0x0a330a, 0.7);
        for (let x = 0; x < worldWidth; x += cellSize) {
            for (let y = 0; y < worldHeight; y += cellSize) {
                gridGraphic.lineBetween(x, y, x + cellSize, y + cellSize);
            }
        }

        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

        mapPlatforms = this.physics.add.staticGroup();
        enemiesGroup = this.physics.add.group();
        projectilesGroup = this.physics.add.group();
        
        // Ground floors base line
        for (let x = 0; x < worldWidth; x += 32) {
            mapPlatforms.create(x, 435, 'platform_tile').setOrigin(0, 0).refreshBody();
        }

        // Float platform steps
        for (let p = 500; p < 11000; p += 400) {
            let h = Phaser.Math.Between(260, 320);
            for(let block = 0; block < 5; block++) {
                mapPlatforms.create(p + (block * 32), h, 'platform_tile').setOrigin(0, 0).refreshBody();
            }
        }

        this.goalPointX1 = 3000;
        this.goalPointX2 = 6000;

        player = this.physics.add.sprite(100, 350, 'hero_sprite');
        player.setCollideWorldBounds(true);

        kittyCat = this.physics.add.sprite(450, 350, 'cat_sprite');
        kittyCat.setCollideWorldBounds(true);

        partnerSusi = this.physics.add.sprite(100, 300, 'susi_sprite');
        partnerSusi.setCollideWorldBounds(true);
        partnerSusi.body.allowGravity = false;
        partnerSusi.setVisible(false);

        this.physics.add.collider(player, mapPlatforms);
        this.physics.add.collider(kittyCat, mapPlatforms);
        this.physics.add.collider(enemiesGroup, mapPlatforms);

        this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);

        cursors = this.input.keyboard.createCursorKeys();

        this.physics.add.overlap(player, kittyCat, () => {
            if(gameState.levelIndex === 1 && !gameState.isKittySaved) {
                gameState.isKittySaved = true;
                showLevelClearScreen("🟩 Grid Vector Segment 1 Safe! Loading Next Phase.", 2);
            }
        }, null, this);

        this.physics.add.overlap(projectilesGroup, enemiesGroup, (bullet, enemy) => {
            bullet.destroy();
            enemy.destroy();
            updateHUDLog("💥 Glitch Cleared!");
        }, null, this);

        this.physics.add.collider(player, enemiesGroup, (pl, enemy) => {
            if (gameState.levelIndex === 1 || gameState.isChangingStage) return;
            gameState.kaliShield -= 20;
            enemy.destroy();
            refreshHUDBars();
            if (gameState.kaliShield <= 0) {
                updateHUDLog("❌ Core Shield Depleted. System Reboot...");
                startCurrentStage();
            }
        }, null, this);

        const bindButton = (id, startProp) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); window[startProp] = true; });
            el.addEventListener('touchend', () => window[startProp] = false);
            el.addEventListener('mousedown', () => window[startProp] = true);
            el.addEventListener('mouseup', () => window[startProp] = false);
        };

        bindButton('btn-left', 'moveLeft');
        bindButton('btn-right', 'moveRight');
        bindButton('btn-jump', 'doJump');
        
        document.getElementById('btn-fire').addEventListener('click', castFire);
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); castFire(); });

        function castFire() {
            if (gameState.levelIndex === 1) return;
            let bulletX = player.x + (facingDirection === 'right' ? 25 : -25);
            let bullet = projectilesGroup.create(bulletX, player.y - 12, 'laser_sprite');
            bullet.body.allowGravity = false;
            bullet.setVelocityX(facingDirection === 'right' ? 600 : -600);
            setTimeout(() => { if(bullet.active) bullet.destroy(); }, 1000);
        }

        this.input.keyboard.on('keydown-SPACE', castFire);
        document.getElementById('start-menu').style.display = 'flex';
        this.physics.pause();
    }

    function update() {
        if (gameState.isChangingStage) return;

        if (cursors.left.isDown || window.moveLeft) { 
            player.setVelocityX(-220); facingDirection = 'left';
        } else if (cursors.right.isDown || window.moveRight) { 
            player.setVelocityX(220); facingDirection = 'right';
            
            if (gameState.levelIndex > 1 && Math.abs(player.x - lastSpawnX) > 450) {
                lastSpawnX = player.x;
                let enemy = enemiesGroup.create(player.x + 450, 200, 'enemy_sprite');
                enemy.setVelocityX(-140);
            }
        } else { 
            player.setVelocityX(0);
        }

        if ((cursors.up.isDown || window.doJump) && player.body.touching.down) { 
            player.setVelocityY(gameState.currentJumpVelocity); 
        }

        if (gameState.isKittySaved || gameState.levelIndex > 1) {
            kittyCat.x = Phaser.Math.Linear(kittyCat.x, player.x - 45, 0.08);
        }
        if (gameState.levelIndex === 3) {
            partnerSusi.x = Phaser.Math.Linear(partnerSusi.x, player.x - 75, 0.07);
            partnerSusi.y = Phaser.Math.Linear(partnerSusi.y, player.y - 40, 0.07);
        }

        if (gameState.levelIndex === 2 && player.x >= this.goalPointX1) {
            showLevelClearScreen("🟩 Matrix checkpoint reached at X=3000!", 3);
        } else if (gameState.levelIndex === 3 && player.x >= this.goalPointX2) {
            showLevelClearScreen("⚡ TERMINAL SUCCESS! The Grid Journey is Complete!", 1);
        }
    }

    function showLevelClearScreen(message, nextLevelTarget) {
        gameState.isChangingStage = true;
        player.setVelocity(0,0);
        game.scene.scenes[0].physics.pause();

        document.getElementById('menu-header').innerText = "🟩 SECTOR CLEAR 🟩";
        document.getElementById('menu-desc').innerText = message;
        document.getElementById('main-menu-btn').innerText = "INITIALIZE NEXT LOGIC SEGMENT";

        document.getElementById('main-menu-btn').onclick = function() {
            gameState.levelIndex = nextLevelTarget;
            gameState.isChangingStage = false;
            startCurrentStage();
        };
        document.getElementById('start-menu').style.display = 'flex';
    }

    window.startCurrentStage = function() {
        document.getElementById('start-menu').style.display = 'none';
        game.scene.scenes[0].physics.resume();
        gameState.kaliShield = 100;

        let desc = "";
        if (gameState.levelIndex === 1) {
            gameState.age = 5; gameState.currentJumpVelocity = -450; gameState.isKittySaved = false;
            kittyCat.x = 450; kittyCat.y = 350; partnerSusi.setVisible(false);
            player.x = 100; player.y = 350;
            desc = "Objective: Head right to scan and capture the yellow grid sector node!";
        } else if (gameState.levelIndex === 2) {
            gameState.age = 12; gameState.currentJumpVelocity = -520; gameState.isKittySaved = true;
            partnerSusi.setVisible(false);
            player.x = 100; player.y = 350;
            desc = "Objective: Evade the red hazard code-blocks and advance down the array corridor!";
        } else if (gameState.levelIndex === 3) {
            gameState.age = 24; gameState.currentJumpVelocity = -580;
            partnerSusi.setVisible(true); partnerSusi.x = player.x - 60; partnerSusi.y = player.y - 40;
            player.x = 100; player.y = 350;
            desc = "Laser subroutines active. Press SPACE or tap FIRE to neutralize threats and complete system runtime.";
        }

        refreshHUDBars();
        updateHUDLog(desc);
    }

    function refreshHUDBars() {
        document.getElementById('hud-lvl').innerText = `Age: ${gameState.age} | Shield: ${gameState.kaliShield}%`;
    }

    function updateHUDLog(msg) {
        document.getElementById('hud-log').innerText = msg;
    }
</script>
</body>
</html>
