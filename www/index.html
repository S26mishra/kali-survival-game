<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kali's Legend: True Cat Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-wrapper { position: relative; width: 800px; height: 600px; border: 2px solid #00ff00; background: #000; }
    </style>
</head>
<body>
    <div id="game-wrapper"></div>

    <script>
        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-wrapper',
            physics: { default: 'arcade', arcade: { gravity: { y: 800 } } },
            scene: { preload: preload, create: create, update: update }
        };
        const game = new Phaser.Game(config);

        function preload() {
            // Keep these exactly as they are so Kali and the Cat look the same
            this.load.image('player', 'assets/player.png'); 
            this.load.image('platform', 'assets/platform.png');
        }

        function create() {
            // Recreating your exact green grid design
            this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0, 0x00FF00, 0.3);

            // Platforms for jumping
            this.platforms = this.physics.add.staticGroup();
            this.platforms.create(400, 580, 'platform').setScale(4).refreshBody();
            this.platforms.create(600, 400, 'platform');
            this.platforms.create(200, 300, 'platform');

            // Kali and Cat remain unchanged
            this.player = this.physics.add.sprite(400, 450, 'player');
            this.player.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.platforms);

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (this.cursors.left.isDown) this.player.setVelocityX(-160);
            else if (this.cursors.right.isDown) this.player.setVelocityX(160);
            else this.player.setVelocityX(0);

            if (this.cursors.up.isDown && this.player.body.touching.down) {
                this.player.setVelocityY(-500);
            }
        }
    </script>
</body>
</html>
