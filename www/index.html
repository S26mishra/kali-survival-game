<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kali's Legend: Quest for Susi</title>
    <!-- Importing high performance Phaser Game framework engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05020a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 450px;
            border: 4px solid #ff007f;
            border-radius: 12px;
            box-shadow: 0 0 30px #00ffff;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    // Phase 2 Engine Setup and configuration
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 600 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    // Global variable trackers for our story states
    let player;
    let partnerSusi;
    let heroCat;
    let cursors;
    let firePowerButton;
    let mapPlatforms;
    let gameState = {
        level: 1,
        heroAge: 5,
        storyLog: "Age 5: Save the falling cat from the room balcony!"
    };

    // STEP 1: ASSET MANAGER LOADING SCREEN
    function preload() {
        // Placeholder primitives used until customized game sprites are ready
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
    }

    // STEP 2: SCENE GENERATOR & PLACEMENTMAP 
    function create() {
        // Add deep space game background
        this.add.image(400, 225, 'sky');

        // Create the level collision platform map
        mapPlatforms = this.physics.add.staticGroup();
        mapPlatforms.create(400, 430, 'ground').setScale(2).refreshBody(); // Main floor
        mapPlatforms.create(600, 300, 'ground'); // Balcony/Roof ledge structure

        // Spawn Hero Kali (Represented by custom graphics block)
        player = this.physics.add.sprite(100, 300, 'kali_hero');
        player.setBounce(0.1);
        player.setCollideWorldBounds(true);

        // Physics interactions rules
        this.physics.add.collider(player, mapPlatforms);

        // Setup controller input streams
        cursors = this.input.keyboard.createCursorKeys();

        // Screen HUD Text tracking story progress
        this.add.text(16, 16, `LEVEL: ${gameState.level} (Age: ${gameState.heroAge})`, { fontSize: '20px', fill: '#00ffff', fontFamily: 'Impact' });
        this.add.text(16, 45, gameState.storyLog, { fontSize: '14px', fill: '#fff' });
    }

    // STEP 3: REAL-TIME CONTROLLER ENGINE LOOP
    function update() {
        // Horizontal walk logic mechanics
        if (cursors.left.isDown) {
            player.setVelocityX(-160);
        } else if (cursors.right.isDown) {
            player.setVelocityX(160);
        } else {
            player.setVelocityX(0);
        }

        // Jump physics action logic
        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-350);
        }
    }
</script>
</body>
</html>
