<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kali's Legend: Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; overflow: hidden; }
        #wrapper { position: relative; width: 800px; height: 550px; }
        .hud { position: absolute; top: 10px; left: 10px; right: 10px; color: #3f3; pointer-events: none; font-size: 13px; font-weight: bold; text-shadow: 1px 1px #000; }
        .menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,5,20,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #3f3; border: 2px solid #3f3; box-sizing: border-box; z-index: 10; }
        .btn { background: #040; border: 2px solid #3f3; padding: 10px 30px; color: #3f3; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn:hover { background: #3f3; color: #000; }
        .controls { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; }
        .btn-group { display: flex; gap: 10px; pointer-events: auto; }
        .c-btn { width: 50px; height: 50px; background: rgba(0,40,0,0.8); border: 2px solid #3f3; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
        .c-btn:active { background: #3f3; color: #000; }
    </style>
</head>
<body>

<div id="wrapper">
    <div class="hud" id="hud">Stage: 1 | Level: 1 | Env: Cyber Grid | Shield: 100% | Kills: 0/5</div>
    
    <div class="controls">
        <div class="btn-group">
            <div class="c-btn" id="m-left">◀</div>
            <div class="c-btn" id="m-right">▶</div>
            <div class="c-btn" id="m-up">▲</div>
            <div class="c-btn" id="m-down">▼</div>
        </div>
        <div class="btn-group">
            <div class="c-btn" id="m-fire" style="border-color:#f33; color:#f33;">🔥</div>
        </div>
    </div>

    <div id="menu" class="menu">
        <h2 id="menu-title">⚔️ KALI'S LEGEND ARENA ⚔️</h2>
        <button class="btn" onclick="startLevel()">START MATCH</button>
    </div>

    <div id="game-container"></div>
</div>

<script>
    const config = {
        type: Phaser.AUTO, width: 800, height: 550, parent: 'game-container',
        physics: { default: 'arcade' }, scene: { preload: preload, create: create, update: update }
    };
    const game = new Phaser.Game(config);

    let player, enemies, boss, lasers, enemyLasers, map;
    let keys, activeKeys = { left: false, right: false, up: false, down: false };
    
    // Track both dynamic stage levels and environmental base stages
    let state = { stage: 1, level: 1, shield: 100, kills: 0, reqKills: 5, active: false, env: 'Cyber Grid' };
    let timers = [];

    function preload() {
        let draw = (key, w, h, cb) => {
            let c = document.createElement('canvas'); c.width = w; c.height = h;
            cb(c.getContext('2d')); game.textures.addCanvas(key, c);
        };
        draw('floor', 40, 40, ctx => { ctx.fillStyle = '#142514'; ctx.fillRect(0,0,40,40); ctx.strokeStyle = '#254025'; ctx.strokeRect(0,0,40,40); });
        draw('player', 32, 40, ctx => { ctx.fillStyle = '#0ff'; ctx.fillRect(4, 10, 24, 30); ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(16, 10, 8, 0, Math.PI*2); ctx.fill(); });
        draw('grunt', 24, 24, ctx => { ctx.fillStyle = '#e74c3c'; ctx.fillRect(0, 0, 24, 24); });
        draw('boss', 60, 70, ctx => { ctx.fillStyle = '#5c2c91'; ctx.fillRect(0, 0, 60, 70); ctx.fillStyle = '#f05'; ctx.fillRect(12, 15, 8, 8); ctx.fillRect(40, 15, 8, 8); });
        draw('laser', 12, 12, ctx => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(6,6,6,0,Math.PI*2); ctx.fill(); });
        draw('fireball', 16, 16, ctx => { ctx.fillStyle = '#f30'; ctx.beginPath(); ctx.arc(8,8,8,0,Math.PI*2); ctx.fill(); });
    }

    function create() {
        map = this.physics.add.staticGroup();
        for (let x = 0; x < 800; x += 40) {
            for (let y = 0; y < 550; y += 40) map.create(x, y, 'floor').setOrigin(0).refreshBody();
        }

        player = this.physics.add.sprite(400, 450, 'player').setCollideWorldBounds(true);
        enemies = this.physics.add.group();
        boss = this.physics.add.group();
        lasers = this.physics.add.group();
        enemyLasers = this.physics.add.group();

        this.physics.add.overlap(lasers, enemies, (l, e) => { l.destroy(); e.destroy(); state.kills++; checkWin(); updateHUD(); });
        this.physics.add.overlap(lasers, boss, (l, b) => { l.destroy(); b.health -= 10; if(b.health<=0) { b.destroy(); winMatch(); } });
        this.physics.add.overlap(enemyLasers, player, (p, el) => { el.destroy(); takeDamage(15); });
        this.physics.add.overlap(player, enemies, (p, e) => { e.destroy(); takeDamage(20); });

        keys = this.input.keyboard.addKeys('W,A,S,D,SPACE,UP,DOWN,LEFT,RIGHT');
        this.input.keyboard.on('keydown-SPACE', fireLaser);

        setupMobileControls();
        this.physics.pause();
    }

    function setupMobileControls() {
        const bind = (id, k) => {
            let el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); activeKeys[k] = true; };
            el.onpointerup = el.onpointerout = (e) => { e.preventDefault(); activeKeys[k] = false; };
        };
        bind('m-left', 'left'); bind('m-right', 'right'); bind('m-up', 'up'); bind('m-down', 'down');
        document.getElementById('m-fire').onpointerdown = (e) => { e.preventDefault(); fireLaser(); };
    }

    function startLevel() {
        document.getElementById('menu').style.display = 'none';
        state.active = true; game.scene.scenes[0].physics.resume();
        state.kills = 0; player.setPosition(400, 450);
        enemies.clear(true, true); boss.clear(true, true); enemyLasers.clear(true, true);
        timers.forEach(t => t.destroy()); timers = [];

        let st = state.stage;
        state.env = st >= 12 ? 'Desert Airspace' : st >= 8 ? 'Rain Flood' : st >= 4 ? 'Snow Area' : 'Cyber Grid';
        
        let colors = { 'Cyber Grid': '#142514', 'Snow Area': '#1a2a3a', 'Rain Flood': '#0f1520', 'Desert Airspace': '#4a3015' };
        let canvas = game.textures.get('floor').source[0].image;
        let ctx = canvas.getContext('2d');
        ctx.fillStyle = colors[state.env]; ctx.fillRect(0,0,40,40);
        ctx.strokeStyle = '#3f3'; ctx.strokeRect(0,0,40,40);
        game.textures.get('floor').update();

        let scene = game.scene.scenes[0];
        timers.push(scene.time.addEvent({ delay: 1000, loop: true, callback: spawnEnemy }));

        if (state.stage % 4 === 0) {
            let b = boss.create(400, 120, 'boss').setCollideWorldBounds(true);
            b.health = 100 + (state.stage * 10);
            timers.push(scene.time.addEvent({ delay: 1200, loop: true, callback: () => bossShoot(b) }));
        }
        updateHUD();
    }

    function spawnEnemy() {
        if (!state.active || state.stage % 4 === 0) return;
        let rx = Phaser.Math.Between(0, 1) === 0 ? 40 : 760;
        let ry = Phaser.Math.Between(40, 500);
        enemies.create(rx, ry, 'grunt');
    }

    function bossShoot(b) {
        if (!state.active || !b.active) return;
        let fireball = enemyLasers.create(b.x, b.y + 30, 'fireball');
        game.scene.scenes[0].physics.moveToObject(fireball, player, 250);
    }

    function fireLaser() {
        if (!state.active) return;
        lasers.create(player.x, player.y - 20, 'laser').setVelocityY(-400);
    }

    function takeDamage(amt) {
        state.shield -= amt; updateHUD();
        if (state.shield <= 0) {
            state.active = false; game.scene.scenes[0].physics.pause();
            document.getElementById('menu-title').innerText = "💀 ARENA CRASHED";
            document.getElementById('menu').style.display = 'flex';
            state.stage = 1; state.level = 1; state.shield = 100;
        }
    }

    function checkWin() {
        if (state.stage % 4 !== 0 && state.kills >= state.reqKills) winMatch();
    }

    function winMatch() {
        state.active = false; game.scene.scenes[0].physics.pause();
        state.stage++; state.level++; state.shield = 100;
        document.getElementById('menu-title').innerText = "🏆 STAGE SECURED!";
        document.getElementById('menu').style.display = 'flex';
    }

    function update() {
        if (!state.active) return;
        player.setVelocity(0);
        let speed = 250;

        if (keys.A.isDown || keys.LEFT.isDown || activeKeys.left) player.setVelocityX(-speed);
        else if (keys.D.isDown || keys.RIGHT.isDown || activeKeys.right) player.setVelocityX(speed);

        if (keys.W.isDown || keys.UP.isDown || activeKeys.up) player.setVelocityY(-speed);
        else if (keys.S.isDown || keys.DOWN.isDown || activeKeys.down) player.setVelocityY(speed);

        enemies.children.iterate(e => { if (e && e.body) game.scene.scenes[0].physics.moveToObject(e, player, 120); });
        boss.children.iterate(b => { if (b && b.body) game.scene.scenes[0].physics.moveToObject(b, player, 40); });
    }

    function updateHUD() {
        let tgt = state.stage % 4 === 0 ? "BOSS FIGHT" : `${state.kills}/${state.reqKills}`;
        document.getElementById('hud').innerText = `Stage: ${state.stage} | Level: ${state.level} | Env: ${state.env} | Shield: ${state.shield}% | Kills: ${tgt}`;
    }
</script>
</body>
</html>
