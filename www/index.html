<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kali's Legend: Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game-wrapper { position: relative; width: 800px; height: 600px; border: 2px solid #00ff00; background: #000; }
        #multiplayer-ui { position: absolute; top: 10px; right: 10px; color: #00ff00; background: rgba(0, 20, 0, 0.8); padding: 10px; width: 200px; border: 1px solid #00ff00; z-index: 100; pointer-events: auto; }
        #chat-box { height: 150px; overflow-y: scroll; border: 1px solid #00ff00; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="multiplayer-ui">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Message..." style="width: 95%; background: #000; color: #00ff00; border: 1px solid #00ff00;">
            <button onclick="sendChatMessage()" style="width: 100%; margin-top: 5px; background: #00ff00; cursor: pointer; color: #000; font-weight: bold;">Send</button>
            <button onclick="joinGameRoom('General')" style="width: 100%; margin-top: 5px; background: #00ff00; cursor: pointer; color: #000; font-weight: bold;">Join Room</button>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:3000");
        const myName = "Player_" + Math.floor(Math.random() * 1000);

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(input.value) {
                socket.emit("sendMessage", { room: 'General', message: input.value, sender: myName });
                input.value = '';
            }
        }

        socket.on("receiveMessage", (data) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div><b>${data.sender}:</b> ${data.message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function joinGameRoom(roomName) {
            socket.emit("joinRoom", roomName);
        }

        const config = {
            type: Phaser.AUTO, 
            width: 800, 
            height: 600, 
            parent: 'game-wrapper',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 800 }, debug: false }
            },
            scene: { preload: preload, create: create }
        };
        const game = new Phaser.Game(config);

        function preload() {
            this.load.image('player', 'assets/player.png');
            this.load.image('platform', 'assets/platform.png'); // Ensure this image exists
        }

        function create() {
            this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0, 0x00FF00, 0.3);
            
            // Create Physics Group for Platforms
            this.platforms = this.physics.add.staticGroup();
            this.platforms.create(400, 568, 'platform').setScale(2).refreshBody(); // Ground
            this.platforms.create(600, 400, 'platform');
            this.platforms.create(200, 300, 'platform');

            // Player with physics
            this.player = this.physics.add.sprite(400, 450, 'player');
            this.player.setBounce(0.2);
            this.player.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.platforms);

            // Inputs
            this.cursors = this.input.keyboard.createCursorKeys();

            // Powers Indicator
            this.add.text(20, 50, 'Powers: [FIRE] (Space) | [LIGHT] (L)', { color: '#ffff00' });
        }

        function update() {
            if (this.cursors.left.isDown) this.player.setVelocityX(-160);
            else if (this.cursors.right.isDown) this.player.setVelocityX(160);
            else this.player.setVelocityX(0);

            // Jump High (Up arrow)
            if (this.cursors.up.isDown && this.player.body.touching.down) {
                this.player.setVelocityY(-500); // Higher jump
            }
            
            // Triggering Powers
            if (this.input.keyboard.addKey('SPACE').isDown) console.log("Fire Power Activated!");
            if (this.input.keyboard.addKey('L').isDown) console.log("Light Power Activated!");
        }
    </script>
</body>
</html>
