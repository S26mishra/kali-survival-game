<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Kali's Legend: Quest for Susi</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #05020a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }
        #game-wrapper {
            position: relative; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        #game-container {
            width: 100%;
            flex-grow: 1;
            max-height: calc(100vh - 110px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container canvas {
            border: 3px solid #ff007f;
            border-radius: 8px;
            box-shadow: 0 0 20px #00ffff;
        }
        #map-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 8, 29, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; box-sizing: border-box; padding: 15px;
        }
        .menu-title { color: #00ffff; font-size: 20px; text-shadow: 0 0 10px #00ffff; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .chapter-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 450px; }
        .chapter-card {
            background: #251442; border: 2px solid #ff007f; border-radius: 8px;
            padding: 8px 12px; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .chapter-card:hover { box-shadow: 0 0 15px #ff007f; background: #361d5e; }
        .chapter-name { font-size: 12px; }
        .chapter-range { font-size: 11px; color: #00ffcc; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
        
        .mobile-controls {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 600px; 
            height: 90px;
            padding: 10px 20px; box-sizing: border-box;
            background: #110724; border-top: 3px solid #ff007f;
            z-index: 5;
        }
        .dir-pad, .action-pad { display: flex; gap: 20px; }
        .ctrl-btn {
            width: 55px; height: 55px;
            background: linear-gradient(180deg, #3a1c6e 0%, #1a0b36 100%);
            border: 2px solid #00ffff; border-radius: 50%;
            color: #fff; font-size: 22px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 0 #000; user-select: none;
            -webkit-user-select: none;
        }
        .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #ff007f; }
        .btn-power { background: linear-gradient(180deg, #ff5722 0%, #bf360c 100%); border-color: #ffcc00; width: 75px; font-size: 14px; border-radius: 12px; }
        
        .hud-overlay {
            position: absolute; top: 15px; left: 15px;
            pointer-events: none; color: white; font-family: Arial, sans-serif;
            z-index: 4; display: flex; flex-direction: column; gap: 5px;
        }
        #hud-lvl { color: #00ffff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        #hud-log { color: #ffffff; font-size: 13px; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud-overlay">
        <div id="hud-lvl">LEVEL: 1 (Age 5)</div>
        <div id="hud-log">Choose a chapter to begin!</div>
    </div>

    <div id="map-menu">
        <div class="menu-title">🗺️ Select Adventure Chapter</div>
        <div class="chapter-list">
            <div class="chapter-card" onclick="launchChapter(1, 5, 'Chapter 1: Childhood Years - Run right endlessly on the city street!')">
                <div class="chapter-name">👶 Chapter 1: Kali Saves His Companion Cat</div>
                <div class="chapter-range">LVL 1 - 20</div>
            </div>
            <div class="chapter-card" onclick="launchChapter(21, 12, 'Chapter 2: Susi Moves to London - Extended Dash')">
                <div class="chapter-name">🏙️ Chapter 2: Defending the Streets Alone</div>
                <div class="chapter-range">LVL 21 - 80</div>
            </div>
            <div class="chapter-card" onclick="launchChapter(81, 19, 'Chapter 3: The Reunion & Cafe Run')">
                <div class="chapter-name">☕ Chapter 3: Meeting Susi Again & Magic Powers!</div>
                <div class="chapter-range">LVL 81 - 150</div>
            </div>
        </div>
    </div>
    <div id="game-container"></div>
    
    <div class="mobile-controls">
        <div class="dir-pad">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="action-pad">
            <div class="ctrl-btn" id="btn-jump">▲</div>
            <div class="ctrl-btn btn-power" id="btn-fire">FIRE</div>
        </div>
    </div>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game-container',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1000 }, debug: false } // Smooth gravity pull
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, partnerSusi, cat, mapPlatforms, cursors, bgCity, fireEmitter;
    let moveLeft = false, moveRight = false, doJump = false;
    
    let gameState = { level: 1, age: 5, log: "" };

    function preload() {
        this.load.image('bg_city', 'https://labs.phaser.io/assets/skies/cityscene.png');
        this.load.image('platform_block', 'https://labs.phaser.io/assets/sprites/platform.png');
        
        this.load.spritesheet('hero_kali', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
        this.load.spritesheet('susi_wings', 'https://labs.phaser.io/assets/sprites/baddie.png', { frameWidth: 32, frameHeight: 32 });
        this.load.spritesheet('real_cat', 'https://labs.phaser.io/assets/sprites/catpasje.png', { frameWidth: 64, frameHeight: 64 });
        this.load.image('fire_particle', 'https://labs.phaser.io/assets/particles/muzzleflash3.png');
    }

    function create() {
        bgCity = this.add.tileSprite(400, 225, 800, 450, 'bg_city').setScrollFactor(0);
        this.physics.world.setBounds(0, 0, 100000, 450);

        mapPlatforms = this.physics.add.staticGroup();
        
        // Ground Row
        for (let x = 0; x < 100000; x += 400) {
            mapPlatforms.create(x, 435, 'platform_block').setScale(2, 1).refreshBody();
        }

        // Bridge Platforms - Adjusted spacing and heights so they are easily reachable
        for (let p = 550; p < 20000; p += 450) {
            let randHeight = Phaser.Math.Between(240, 280); 
            mapPlatforms.create(p, randHeight, 'platform_block').setScale(0.5, 0.6).refreshBody();
        }

        // Kali Setup
        player = this.physics.add.sprite(100, 350, 'hero_kali');
        player.setBounce(0.02).setCollideWorldBounds(true);

        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('hero_kali', { start: 0, end: 3 }),
            frameRate: 12,
            repeat: -1
        });
        this.anims.create({
            key: 'turn',
            frames: [ { key: 'hero_kali', frame: 4 } ],
            frameRate: 20
        });

        cat = this.physics.add.sprite(550, 200, 'real_cat'); // Placed closer on the first platform
        cat.setCollideWorldBounds(true);

        partnerSusi = this.physics.add.sprite(160, 350, 'susi_wings');
        partnerSusi.setCollideWorldBounds(true);
        partnerSusi.setVisible(false);

        fireEmitter = this.add.particles(0, 0, 'fire_particle', {
            speed: 200, scale: { start: 0.4, end: 0 }, blendMode: 'ADD', lifespan: 400
        });
        fireEmitter.stop();

        this.physics.add.collider(player, mapPlatforms);
        this.physics.add.collider(cat, mapPlatforms);
        this.physics.add.collider(partnerSusi, mapPlatforms);

        this.cameras.main.setBounds(0, 0, 100000, 450);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);

        this.physics.add.overlap(player, cat, () => {
            if(gameState.level === 1) {
                updateHUDLog("VICTORY! You rescued the cat! Keep exploring the infinite world.");
                cat.setVelocityX(140);
            }
        }, null, this);

        // Input Bindings
        const bindButton = (id, startProp) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); window[startProp] = true; });
            el.addEventListener('touchend', () => window[startProp] = false);
            el.addEventListener('mousedown', () => window[startProp] = true);
            el.addEventListener('mouseup', () => window[startProp] = false);
        };

        bindButton('btn-left', 'moveLeft');
        bindButton('btn-right', 'moveRight');
        bindButton('btn-jump', 'doJump');
        
        document.getElementById('btn-fire').addEventListener('click', castFire);
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); castFire(); });

        function castFire() {
            fireEmitter.start();
            fireEmitter.startFollow(player, player.flipX ? -20 : 20, -10);
            setTimeout(() => { fireEmitter.stop(); }, 1000);
        }
    }

    function update() {
        // KEY FIX: Reversed flipX properties so tracking aligns perfectly with movement directions
        if (window.moveLeft) { 
            player.setVelocityX(-220); player.anims.play('walk', true); player.flipX = true; // Faces Left
            bgCity.tilePositionX = this.cameras.main.scrollX * 0.5;
        } else if (window.moveRight) { 
            player.setVelocityX(220); player.anims.play('walk', true); player.flipX = false; // Faces Right
            bgCity.tilePositionX = this.cameras.main.scrollX * 0.5;
        } else { 
            player.setVelocityX(0); player.anims.play('turn');
        }

        // KEY FIX: Increased Jump force to -540 so he hops onto bridges with ease
        if (window.doJump && player.body.touching.down) { 
            player.setVelocityY(-540); 
        }

        if (gameState.level > 1) { cat.x = player.x - 45; cat.y = player.y + 5; }
    }

    window.launchChapter = function(startLvl, ageVal, titleLog) {
        document.getElementById('map-menu').style.display = 'none';
        gameState.level = startLvl; gameState.age = ageVal; gameState.log = titleLog;
        document.getElementById('hud-lvl').innerText = `LEVEL: ${gameState.level} (Age ${gameState.age})`;
        document.getElementById('hud-log').innerText = gameState.log;
        partnerSusi.setVisible(startLvl >= 81);
    }

    function updateHUDLog(msg) {
        document.getElementById('hud-log').innerText = msg;
    }
</script>
</body>
</html>
