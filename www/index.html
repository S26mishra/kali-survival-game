<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kali's Legend: True Cat Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }
        #game-wrapper {
            position: relative; 
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 2px solid #33ff33;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .hud-overlay {
            position: absolute; top: 10px; left: 10px; right: 10px; pointer-events: none; color: #33ff33;
            z-index: 4; display: flex; flex-direction: column; gap: 6px;
        }
        #hud-lvl { font-size: 12px; font-weight: bold; text-shadow: 2px 2px #000; }
        #hud-log { font-size: 10px; background: rgba(0,0,0,0.85); padding: 5px 8px; border: 1px solid #33ff33; border-radius: 4px; width: fit-content; max-width: 100%; }
        
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 15, 0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; color: #33ff33; border: 2px solid #33ff33; box-sizing: border-box;
            padding: 20px;
        }
        .menu-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px #33ff33; text-align: center; }
        .btn-action {
            background: #004400; border: 2px solid #33ff33; padding: 12px 35px; font-size: 14px; color: #33ff33;
            cursor: pointer; font-weight: bold; text-transform: uppercase; margin: 10px;
            border-radius: 4px;
        }
        .btn-action:hover { background: #33ff33; color: #000; }
        #defeat-menu { display: none; background: rgba(20, 0, 0, 0.98); border-color: #ff3333; color: #ff3333; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud-overlay">
        <div id="hud-lvl">Stage: 4 | Level: 4 | Shield: 100%</div>
        <div id="hud-log">Dual Elemental Engine Online.</div>
    </div>

    <!-- UI Start Menu -->
    <div id="start-menu" class="overlay-screen">
        <div class="menu-title">🟩 WEAPONS CALIBRATED 🟩</div>
        <p style="text-align:center; max-width:400px; font-size:12px; line-height:1.5; margin-bottom: 20px;">
            Fire: [SPACE / F]<br>Electric Shock: [L / E]
        </p>
        <button class="btn-action" onclick="initRuntimeLevel()">ENGAGE COMBAT</button>
    </div>

    <!-- Defeat Screen -->
    <div id="defeat-menu" class="overlay-screen">
        <div class="menu-title" style="text-shadow: 0 0 10px #ff3333;">💀 CORE VAPORIZED 💀</div>
        <button class="btn-action" style="border-color:#ff3333; color:#ff3333; background:#220000;" onclick="resetToLevelBeginning()">RELOAD CORE</button>
    </div>

    <div id="game-container"></div>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 550, 
        parent: 'game-container',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1400 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, partnerSusi, targetKitty, mapPlatforms, cursors, enemiesGroup, bossGroup, bossLasers, kaliLasers, susiLasers, enemyLasers;
    let cloudsGroup;
    let moveLeft = false, moveRight = false, doJump = false;
    let facingDirection = 'right';
    let lastDroneFireTime = 0;
    let globalAmbushTimer = null;
    let currentBossInstance = null;
    
    // Independent key setups
    let keyF, keyE, keyL, keySpace;

    let sysProgress = {
        stage: 4,
        level: 4,
        shield: 100,
        runtimeActive: false
    };

    function preload() {
        let generateVectorGraphic = (key, w, h, drawCallback) => {
            let canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            let ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, w, h);
            drawCallback(ctx);
            game.textures.addCanvas(key, canvas);
        };

        generateVectorGraphic('kali_humanoid', 32, 48, (ctx) => {
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(16, 8, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#00ffff'; ctx.fillRect(13, 6, 7, 2);
            ctx.fillStyle = '#3366cc'; ctx.fillRect(10, 14, 12, 16);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(6, 15, 4, 12); ctx.fillRect(22, 15, 4, 12);
            ctx.fillStyle = '#222222'; ctx.fillRect(10, 30, 5, 14); ctx.fillRect(17, 30, 5, 14);
        });

        generateVectorGraphic('kitty_node', 32, 32, (ctx) => {
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 2; ctx.strokeRect(2, 2, 28, 28);
            ctx.fillStyle = '#33ff33'; ctx.fillRect(10, 10, 12, 12);
        });

        generateVectorGraphic('susi_drone', 32, 32, (ctx) => {
            ctx.fillStyle = '#ffffff'; ctx.fillRect(6, 14, 18, 12); 
            ctx.fillStyle = '#ffaa66'; ctx.fillRect(16, 6, 10, 10);  
            ctx.fillStyle = '#00ffff'; ctx.fillRect(18, 9, 2, 2);
        });

        generateVectorGraphic('matrix_floor', 32, 32, (ctx) => {
            ctx.fillStyle = '#0d260d'; ctx.fillRect(0, 0, 32, 32);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 1; ctx.strokeRect(0, 0, 32, 32);
        });

        generateVectorGraphic('cyber_platform', 64, 16, (ctx) => {
            ctx.fillStyle = '#114411'; ctx.fillRect(0, 0, 64, 16);
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, 64, 16);
        });

        generateVectorGraphic('virus_hazard', 36, 36, (ctx) => {
            ctx.translate(18, 18); ctx.fillStyle = '#ff0055';
            for (let i = 0; i < 8; i++) { ctx.rotate(Math.PI / 4); ctx.beginPath(); ctx.moveTo(-4, -6); ctx.lineTo(0, -18); ctx.lineTo(4, -6); ctx.fill(); }
        });

        generateVectorGraphic('humanoid_boss', 48, 72, (ctx) => {
            ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(24, 12, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#220044'; ctx.fillRect(12, 22, 24, 26);
            ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2; ctx.strokeRect(12, 22, 24, 26);
        });

        // Fire Power Graphic
        generateVectorGraphic('laser_fire', 26, 10, (ctx) => { 
            ctx.fillStyle = '#ffffff'; ctx.fillRect(4, 2, 18, 6);
            ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, 26, 10);
        });

        // NEW: Electric Shock Power Vector Graphic
        generateVectorGraphic('laser_electric', 30, 14, (ctx) => { 
            ctx.strokeStyle = '#ffff33'; ctx.lineWidth = 2;
            ctx.shadowBlur = 4; ctx.shadowColor = '#ffff00';
            ctx.beginPath();
            ctx.moveTo(0, 7); ctx.lineTo(8, 2); ctx.lineTo(14, 12); ctx.lineTo(22, 2); ctx.lineTo(30, 7);
            ctx.stroke();
        });
        
        generateVectorGraphic('laser_red', 12, 12, (ctx) => {
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(6, 6, 6, 0, Math.PI * 2); ctx.fill();
        });
        generateVectorGraphic('laser_purple', 10, 10, (ctx) => { ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(5,5,5,0,Math.PI*2); ctx.fill(); });
        generateVectorGraphic('matrix_cloud', 96, 32, (ctx) => {
            ctx.fillStyle = 'rgba(30, 80, 30, 0.35)'; ctx.beginPath(); ctx.arc(24, 20, 12, 0, Math.PI * 2); ctx.arc(48, 14, 16, 0, Math.PI * 2); ctx.arc(72, 20, 12, 0, Math.PI * 2); ctx.fill();
        });
    }

    function create() {
        // Enforce Multi-touch capacity
        this.input.addPointer(3);

        this.gridGraphic = this.add.graphics();
        this.gridGraphic.lineStyle(1, 0x114411, 0.6);
        for (let x = 0; x <= 4000; x += 40) { this.gridGraphic.lineBetween(x, 0, x, 434); }
        for (let y = 0; y <= 434; y += 40) { this.gridGraphic.lineBetween(0, y, 4000, y); }

        this.physics.world.setBounds(0, 0, 4000, 434);
        
        cloudsGroup = this.add.group();
        for (let c = 0; c < 15; c++) {
            cloudsGroup.add(this.add.image(Phaser.Math.Between(0, 4000), Phaser.Math.Between(20, 130), 'matrix_cloud').setScrollFactor(0.4));
        }

        mapPlatforms = this.physics.add.staticGroup();
        enemiesGroup = this.physics.add.group();
        bossGroup = this.physics.add.group();
        kaliLasers = this.physics.add.group();
        susiLasers = this.physics.add.group();
        enemyLasers = this.physics.add.group();

        for (let x = 0; x < 4000; x += 32) {
            mapPlatforms.create(x, 418, 'matrix_floor').setOrigin(0, 0).refreshBody();
        }

        for (let pX = 250; pX < 3800; pX += 300) {
            let pY = Phaser.Math.Between(200, 300);
            mapPlatforms.create(pX, pY, 'cyber_platform').refreshBody();
        }

        player = this.physics.add.sprite(150, 320, 'kali_humanoid').setCollideWorldBounds(true);
        partnerSusi = this.physics.add.sprite(100, 300, 'susi_drone').setCollideWorldBounds(true);
        partnerSusi.body.allowGravity = false;
        targetKitty = this.physics.add.sprite(450, 380, 'kitty_node').setCollideWorldBounds(true);

        this.physics.add.collider(player, mapPlatforms);
        this.physics.add.collider(targetKitty, mapPlatforms);
        this.physics.add.collider(enemiesGroup, mapPlatforms);
        this.physics.add.collider(bossGroup, mapPlatforms);

        this.cameras.main.setBounds(0, 0, 4000, 434);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);

        cursors = this.input.keyboard.createCursorKeys();
        
        // Setup separate Key bindings to avoid overwriting inputs
        keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        keyF = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.F);
        keyL = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.L);
        keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

        this.physics.add.overlap(kaliLasers, enemiesGroup, (projectile, enemy) => { projectile.destroy(); enemy.destroy(); });
        this.physics.add.overlap(kaliLasers, bossGroup, (projectile, boss) => {
            projectile.destroy();
            boss.health -= 5;
            if (boss.health <= 0) { boss.destroy(); currentBossInstance = null; }
        });

        this.physics.add.overlap(enemyLasers, player, (pl, laser) => {
            laser.destroy(); sysProgress.shield -= 10; refreshTerminalHUD(); checkPlayerMortality();
        });

        // Interface Button HUD Assembly
        let createVirtualBtn = (x, y, radius, label, color, pointerDownCallback, pointerUpCallback) => {
            let btnBg = this.add.circle(x, y, radius, color).setScrollFactor(0).setInteractive().setDepth(10).setAlpha(0.6);
            this.add.text(x, y, label, { font: 'bold 14px Arial', color: '#ffffff' }).setScrollFactor(0).setOrigin(0.5).setDepth(11);
            
            btnBg.on('pointerdown', pointerDownCallback);
            if(pointerUpCallback) {
                btnBg.on('pointerup', pointerUpCallback);
                btnBg.on('pointerout', pointerUpCallback);
            }
        };

        // UI Buttons laid out cleanly
        createVirtualBtn(60, 485, 26, '◀', 0x004400, () => { moveLeft = true; }, () => { moveLeft = false; });
        createVirtualBtn(125, 485, 26, '▶', 0x004400, () => { moveRight = true; }, () => { moveRight = false; });
        createVirtualBtn(190, 485, 26, '▲', 0x006600, () => { doJump = true; }, () => { doJump = false; });
        
        createVirtualBtn(645, 485, 34, 'LIGHT', 0x666600, () => { triggerElectricShockPower(); });
        createVirtualBtn(735, 485, 34, 'FIRE', 0x660000, () => { triggerKaliFire(); });

        document.getElementById('start-menu').style.display = 'flex';
        this.physics.pause();
    }

    function triggerKaliFire() {
        if (!sysProgress.runtimeActive) return;
        let offset = facingDirection === 'right' ? 25 : -25;
        let shot = kaliLasers.create(player.x + offset, player.y - 6, 'laser_fire');
        shot.body.allowGravity = false;
        shot.setVelocityX(facingDirection === 'right' ? 750 : -750);
        document.getElementById('hud-log').innerText = "🔥 FIRE POWER: Unleashed flame core spike!";
    }

    function triggerElectricShockPower() {
        if (!sysProgress.runtimeActive) return;
        let offset = facingDirection === 'right' ? 25 : -25;
        let shockWave = kaliLasers.create(player.x + offset, player.y - 6, 'laser_electric');
        shockWave.body.allowGravity = false;
        
        // Faster moving projectile with an electric tint
        shockWave.setVelocityX(facingDirection === 'right' ? 900 : -900);
        shockWave.setTint(0xffff00);
        
        document.getElementById('hud-log').innerText = "⚡ ELECTRIC POWER: Shockwave surge deployed!";
    }

    function checkPlayerMortality() {
        if (sysProgress.shield <= 0) {
            sysProgress.runtimeActive = false;
            game.scene.scenes[0].physics.pause();
            if (globalAmbushTimer) { globalAmbushTimer.destroy(); globalAmbushTimer = null; }
            document.getElementById('defeat-menu').style.display = 'flex';
        }
    }

    window.resetToLevelBeginning = function() {
        document.getElementById('defeat-menu').style.display = 'none';
        sysProgress.shield = 100;
        initRuntimeLevel(); 
    };

    function initRuntimeLevel() {
        document.getElementById('start-menu').style.display = 'none';
        game.scene.scenes[0].physics.resume();
        sysProgress.runtimeActive = true;

        if (globalAmbushTimer) { globalAmbushTimer.destroy(); globalAmbushTimer = null; }
        
        player.x = 150; player.y = 320; player.setVelocity(0, 0);
        partnerSusi.x = 100; partnerSusi.y = 300;

        enemiesGroup.clear(true, true);
        bossGroup.clear(true, true);
        enemyLasers.clear(true, true);

        // Instantiating Stage 4 Boss
        currentBossInstance = bossGroup.create(650, 300, 'humanoid_boss');
        currentBossInstance.health = 100;
        currentBossInstance.setVelocityX(-80);
        currentBossInstance.setCollideWorldBounds(true);

        globalAmbushTimer = game.scene.scenes[0].time.addEvent({
            delay: 2000, loop: true, callback: () => {
                if (!sysProgress.runtimeActive) return;
                let hazard = enemiesGroup.create(Phaser.Math.Between(player.x - 200, player.x + 400), 60, 'virus_hazard');
                hazard.body.allowGravity = false;
                game.scene.scenes[0].physics.moveToObject(hazard, player, 50);
            }
        });
        
        refreshTerminalHUD();
    }

    function update(time) {
        if (!sysProgress.runtimeActive) return;

        partnerSusi.x = Phaser.Math.Linear(partnerSusi.x, player.x - (facingDirection === 'right' ? 35 : -35), 0.2);
        partnerSusi.y = Phaser.Math.Linear(partnerSusi.y, player.y - 10, 0.2);

        // Standard Keyboard Input Handling matching buttons cleanly
        if (cursors.left.isDown || moveLeft) {
            player.setVelocityX(-240); facingDirection = 'left';
        } else if (cursors.right.isDown || moveRight) {
            player.setVelocityX(240); facingDirection = 'right';
        } else {
            player.setVelocityX(0);
        }

        if ((cursors.up.isDown || doJump) && player.body.touching.down) {
            player.setVelocityY(-620); doJump = false; 
        }

        // Dedicated individual checking for keys to ensure simultaneous actions execute
        if (Phaser.Input.Keyboard.JustDown(keySpace) || Phaser.Input.Keyboard.JustDown(keyF)) {
            triggerKaliFire();
        }
        if (Phaser.Input.Keyboard.JustDown(keyL) || Phaser.Input.Keyboard.JustDown(keyE)) {
            triggerElectricShockPower();
        }
    }

    function refreshTerminalHUD() {
        document.getElementById('hud-lvl').innerText = `Stage: ${sysProgress.stage} | Level: ${sysProgress.level} | Shield: ${sysProgress.shield}%`;
    }
</script>
</body>
</html>
